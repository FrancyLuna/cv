name: Build CV PDF

on:
  push:
    paths:
      - "main.tex"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Rename PDF
        run: mv main.pdf cv.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Francy-Luna-Diaz-CV
          path: cv.pdf

      - name: Push CV to website repo
        run: |
          git clone https://x-access-token:${{ secrets.WEBSITE_REPO_TOKEN }}@github.com/FrancyLuna/LunaDiaz.github.io.git website
          cp cv.pdf website/cv.pdf
          cd website
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cv.pdf
          git commit -m "Update CV PDF" || echo "No changes to commit"
          git push
